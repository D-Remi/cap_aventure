# ============================================================
# CapAventure — Config Nginx pour capaventure74.fun
# Certbot gère déjà le SSL → ce fichier complète la config
#
# Sur Ionos ton vhost est déjà créé avec Certbot.
# Remplacer le contenu du fichier dans :
# /etc/nginx/sites-available/capaventure74.fun (ou similaire)
# ============================================================

server {
    server_name capaventure74.fun www.capaventure74.fun;

    # Frontend React — fichiers statiques buildés
    root /var/www/cap_aventure/frontend/dist;
    index index.html;

    # SPA : toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API NestJS — proxy vers le backend Node.js
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Uploads (photos activités, documents parents)
    location /uploads/ {
        alias /var/www/cap_aventure/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Cache assets statiques (JS, CSS, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Taille max upload (photos)
    client_max_body_size 10M;

    # SSL — géré par Certbot (ne pas modifier ces lignes)
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/capaventure74.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capaventure74.fun/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = www.capaventure74.fun) {
        return 301 https://$host$request_uri;
    }
    if ($host = capaventure74.fun) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name capaventure74.fun www.capaventure74.fun;
    return 404;
}
