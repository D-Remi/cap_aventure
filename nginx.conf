# ============================================================
# CapAventure — Config Nginx
# Fichier : /etc/nginx/sites-available/capaventure
# ============================================================

server {
    listen 80;
    server_name capaventure74.fr www.capaventure74.fr;

    # Redirection HTTP → HTTPS (après avoir obtenu le certificat SSL)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name capaventure74.fr www.capaventure74.fr;

    # SSL — généré par Certbot
    ssl_certificate     /etc/letsencrypt/live/capaventure74.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/capaventure74.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Frontend React (fichiers statiques buildés)
    root /var/www/capaventure/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # API NestJS (proxy vers le backend Node)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    # Uploads (photos activités, documents)
    location /uploads/ {
        alias /var/www/capaventure/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Cache assets statiques
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Sécurité
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Limite taille upload (photos)
    client_max_body_size 10M;
}
